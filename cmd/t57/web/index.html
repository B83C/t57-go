<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T57 RFID — Hex Editor</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:16px;max-width:660px;margin:0 auto}
  h1{font-size:1.1rem;margin:0;display:inline}
  .sub{color:#8b949e;font-size:.8rem;margin:2px 0 8px}

  .bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:#f85149;display:inline-block;flex-shrink:0}
  .dot.on{background:#3fb950}
  .st{color:#8b949e;font-size:.8rem}
  select,button{background:#21262d;color:#e6edf3;border:1px solid #30363d;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.8rem}
  button:hover{background:#30363d}
  button:disabled{opacity:.4;cursor:not-allowed}
  .primary{background:#238636;border-color:#2ea043}
  .primary:hover{background:#2ea043}
  .danger{background:#da3633;border-color:#f85149}
  .danger:hover{background:#f85149}

  .grid{display:flex;flex-direction:column;gap:1px;margin:8px 0}
  .row{display:flex;align-items:center;gap:3px;padding:2px 4px;border-radius:4px;transition:background .15s}
  .row:nth-child(odd){background:#161b22}
  .row.changed{background:#2a2410;outline:1px solid #d29922}
  .blk{color:#8b949e;font-size:.74rem;width:105px;flex-shrink:0}
  .byt{width:30px;height:26px;text-align:center;font-family:monospace;font-size:.8rem;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:0;text-transform:uppercase}
  .byt:focus{border-color:#58a6ff;outline:none}
  .st2{font-size:.65rem;color:#484f58;width:50px;text-align:center;flex-shrink:0}

  #log{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 10px;margin-top:8px;font-family:monospace;font-size:.8rem;min-height:40px;max-height:150px;overflow-y:auto;white-space:pre-wrap}
  #log .t{color:#484f58}
  #log .ok{color:#3fb950}
  #log .er{color:#f85149}

  #loading{text-align:center;margin-top:48px;color:#8b949e}
</style>
</head>
<body>

<div id="loading" class="loading">Loading…</div>

<div id="app" style="display:none">
  <h1>T57 RFID</h1>
  <div class="sub">pure JS · Web Serial API · 0xAA-…-0xBB</div>

  <div class="bar">
    <span class="dot" id="dot"></span>
    <span class="st" id="status">Not connected</span>
    <select id="baudSel">
      <option value="9600" selected>9600</option>
      <option value="19200">19200</option>
      <option value="38400">38400</option>
      <option value="57600">57600</option>
      <option value="115200">115200</option>
    </select>
    <button id="btnConn" class="primary">Connect</button>
    <button id="btnDisc" disabled>Disconnect</button>
    <button id="btnRead" class="primary" disabled>Read All</button>
    <button id="btnWrite" class="danger" disabled>Write</button>
    <button id="btnDef" disabled>Default Cfg</button>
    <button id="btnBeep" disabled>Beep</button>
  </div>

  <div class="grid" id="grid"></div>

  <div id="log">Ready. Click Connect.</div>
</div>

<script>
"use strict";

// ===== protocol =====
const STX = 0xAA, ETX = 0xBB;

function bcc(bytes) { let x = 0; for (const b of bytes) x ^= b; return x; }

function encodeFrame(station, cmd, data) {
  const len = 1 + data.length;
  const frame = new Uint8Array(5 + data.length);
  frame[0] = STX; frame[1] = station; frame[2] = len;
  frame[3] = cmd; frame.set(data, 4);
  frame[4 + data.length] = bcc(frame.subarray(1, 4 + data.length));
  frame[5 + data.length] = ETX;
  return frame;
}

function decodeFrame(buf) {
  if (buf.length < 6) throw new Error('frame too short');
  if (buf[0] !== STX) throw new Error('bad STX ' + buf[0].toString(16));
  const len = buf[2], dataLen = len - 1;
  const bccPos = 4 + dataLen, lastPos = bccPos + 1;
  if (buf.length <= lastPos) throw new Error('frame truncated');
  if (buf[lastPos] !== ETX) throw new Error('bad ETX ' + buf[lastPos].toString(16));
  const calcBCC = bcc(buf.subarray(1, bccPos));
  if (calcBCC !== buf[bccPos]) throw new Error('bad BCC');
  return { status: buf[3], data: buf.slice(4, bccPos) };
}

async function readFrame(port) {
  const reader = port.readable.getReader();
  const buf = [];
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      for (const b of value) {
        buf.push(b);
        if (b === ETX) return new Uint8Array(buf);
      }
    }
  } finally { reader.releaseLock(); }
  throw new Error('no data');
}

// ===== state =====
let port = null;
let writer = null;
let reader = null;
let connected = false;
const blocks = Array.from({length:8}, () => new Uint8Array(4));
const lastRead = Array.from({length:8}, () => null);
const changed = new Set();

// ===== protocol helpers =====
async function transact(cmd, payload) {
  const frame = encodeFrame(0, cmd, payload);
  debug('tx:', Array.from(frame).map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' '));
  await writer.write(frame);
  const resp = await readFrame(port);
  debug('rx:', Array.from(resp).map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' '));
  const dec = decodeFrame(resp);
  if (dec.status !== 0) throw new Error(`device status ${dec.status.toString(16)}: ${dec.data.length ? dec.data[0].toString(16) : '?'}`);
  return dec.data;
}

async function readBlock(n) {
  const raw = await transact(0x90, n === 0 ? [0, 0] : [0, n]);
  if (raw.length >= 4) return raw.slice(0, 4);
  throw new Error(`short read: ${raw.length} bytes`);
}

async function readAll() {
  // Try page-only cascade first (1 byte = no block address)
  try {
    const raw = await transact(0x90, [0]);
    if (raw.length >= 4) {
      const n = Math.min(Math.floor(raw.length / 4), 7);
      for (let i = 0; i < n; i++) blocks[i+1] = new Uint8Array(raw.slice(i*4, i*4+4));
      blocks[0] = await readBlock(0);
      return;
    }
  } catch(e) { debug('cascade failed:', e.message); }
  // Fall back to individual reads
  for (let i = 0; i <= 7; i++) blocks[i] = await readBlock(i);
}

async function writeBlock(n, data) {
  if (n === 0) {
    await transact(0x91, [0, 0, data[0], data[1], data[2], data[3]]);
  } else {
    await transact(0x91, [0, n, data[0], data[1], data[2], data[3]]);
  }
}

async function beep() { await transact(0x89, [5, 1]); }

// ===== UI =====
function el(id) { return document.getElementById(id); }

function grid() {
  const g = el('grid'); g.innerHTML = '';
  for (let b = 0; b < 8; b++) {
    const r = document.createElement('div'); r.className = 'row'; r.id = 'r'+b;
    const l = document.createElement('span'); l.className = 'blk';
    l.textContent = b === 0 ? 'Config' : 'Block '+b;
    r.appendChild(l);
    for (let i = 0; i < 4; i++) {
      const inp = document.createElement('input'); inp.className = 'byt';
      inp.id = 'b'+b+'_'+i; inp.maxLength = 2; inp.placeholder = '00';
      inp.oninput = () => onEdit(b);
      inp.onkeydown = e => {
        if (e.key === 'ArrowRight' && i < 3) { e.preventDefault(); el('b'+b+'_'+(i+1)).focus(); }
        if (e.key === 'ArrowLeft' && i > 0) { e.preventDefault(); el('b'+b+'_'+(i-1)).focus(); }
        if (e.key === 'ArrowUp' && b > 0) { e.preventDefault(); el('b'+(b-1)+'_'+i).focus(); }
        if (e.key === 'ArrowDown' && b < 7) { e.preventDefault(); el('b'+(b+1)+'_'+i).focus(); }
      };
      r.appendChild(inp);
    }
    const s = document.createElement('span'); s.className = 'st2'; s.id = 's'+b;
    r.appendChild(s);
    g.appendChild(r);
  }
}

function setBlock(b, data) {
  for (let i = 0; i < 4; i++) el('b'+b+'_'+i).value = data[i].toString(16).padStart(2,'0').toUpperCase();
  blocks[b] = new Uint8Array(data);
}

function getBlock(b) {
  const out = new Uint8Array(4);
  for (let i = 0; i < 4; i++) out[i] = parseInt(el('b'+b+'_'+i).value || '0', 16) || 0;
  return out;
}

function onEdit(b) {
  const cur = getBlock(b);
  blocks[b] = cur;
  const was = lastRead[b];
  if (was && !bytesEqual(cur, was)) {
    changed.add(b); el('r'+b).classList.add('changed'); el('s'+b).textContent = 'CHANGED';
  } else {
    changed.delete(b); el('r'+b).classList.remove('changed'); el('s'+b).textContent = '';
  }
  render();
}

function bytesEqual(a, b) { for (let i = 0; i < 4; i++) if (a[i] !== b[i]) return false; return true; }

function render() {
  el('dot').className = 'dot' + (connected ? ' on' : '');
  el('status').textContent = connected ? 'Connected' : 'Not connected';
  el('btnConn').disabled = connected;
  el('btnDisc').disabled = !connected;
  el('btnRead').disabled = !connected;
  el('btnWrite').disabled = !connected || changed.size === 0;
  el('btnDef').disabled = !connected;
  el('btnBeep').disabled = !connected;
}

function log(msg, cls) {
  const d = new Date();
  el('log').innerHTML += `<span class="t">[${d.toLocaleTimeString()}]</span> <span class="${cls}">${msg}</span>\n`;
  el('log').scrollTop = el('log').scrollHeight;
}

function debug(...args) {
  if (window.DEBUG) console.debug('t57:', ...args);
}

// ===== connection =====
el('btnConn').onclick = async () => {
  if (!navigator.serial) { log('Web Serial not available', 'er'); return; }
  try {
    port = await navigator.serial.requestPort();
    const baud = parseInt(el('baudSel').value);
    log(`Opening port at ${baud} baud…`, 't');
    await port.open({ baudRate: baud });
    writer = port.writable.getWriter();
    connected = true;
    render();
    log('Connected', 'ok');
  } catch(e) { log('Connect: '+e, 'er'); console.error(e); }
};

el('btnDisc').onclick = async () => {
  connected = false; render();
  try { if (writer) { writer.releaseLock(); writer = null; } if (port) { await port.close(); port = null; } } catch(e) {}
  for (let b = 0; b < 8; b++) { lastRead[b] = null; setBlock(b, [0,0,0,0]); }
  changed.clear(); render();
  log('Disconnected', 'er');
};

// ===== commands =====
el('btnRead').onclick = async () => {
  try {
    log('Reading…', 't');
    await readAll();
    for (let b = 0; b < 8; b++) {
      setBlock(b, blocks[b]);
      lastRead[b] = new Uint8Array(blocks[b]);
      changed.delete(b); el('r'+b).classList.remove('changed'); el('s'+b).textContent = '✓';
    }
    render();
    log('Read 8 blocks', 'ok');
  } catch(e) { log('Read: '+e, 'er'); console.error(e); }
};

el('btnWrite').onclick = async () => {
  const toWrite = [...changed];
  if (toWrite.length === 0) { log('Nothing changed', 't'); return; }
  if (!confirm(`Write ${toWrite.length} block(s): ${toWrite.join(',')}?`)) { log('Cancelled', 't'); return; }
  try {
    for (const b of toWrite) {
      const data = getBlock(b);
      await writeBlock(b, data);
      lastRead[b] = new Uint8Array(data);
      changed.delete(b); el('r'+b).classList.remove('changed'); el('s'+b).textContent = '✓';
    }
    render();
    log(`Wrote ${toWrite.length} block(s)`, 'ok');
  } catch(e) { log('Write: '+e, 'er'); console.error(e); }
};

el('btnDef').onclick = () => {
  const data = new Uint8Array([0x00, 0x08, 0x80, 0xE8]);
  setBlock(0, data); changed.add(0); el('r0').classList.add('changed'); el('s0').textContent = 'CHANGED';
  render();
  log('Config set to 000880E8 — Write to apply', 'ok');
};

el('btnBeep').onclick = async () => {
  try { await beep(); log('Beep!', 'ok'); } catch(e) { log('Beep: '+e, 'er'); }
};

// ===== init =====
grid();
el('loading').style.display = 'none';
el('app').style.display = 'block';
</script>
</body>
</html>
