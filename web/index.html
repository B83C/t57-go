<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T57 RFID — Hex Editor</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:16px;max-width:720px;margin:0 auto}
  h1{font-size:1.1rem;margin:0;display:inline}
  .sub{color:#8b949e;font-size:.8rem;margin:2px 0 8px}

  .bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .dot{width:8px;height:8px;border-radius:50%;background:#f85149;display:inline-block;flex-shrink:0}
  .dot.on{background:#3fb950}
  .st{color:#8b949e;font-size:.8rem}
  .group{display:flex;gap:4px;align-items:center}
  .group + .group::before{content:'';display:inline-block;width:1px;height:20px;background:#30363d;margin:0 4px}
  select,button{background:#21262d;color:#e6edf3;border:1px solid #30363d;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:background .15s}
  button:hover{background:#30363d}
  button:disabled{opacity:.4;cursor:not-allowed}
  .primary{background:#238636;border-color:#2ea043}
  .primary:hover{background:#2ea043}
  .danger{background:#da3633;border-color:#f85149}
  .danger:hover{background:#f85149}

  .grid{display:flex;flex-direction:column;gap:1px;margin:8px 0;border:1px solid #21262d;border-radius:8px;overflow:hidden}
  .row{display:flex;align-items:center;gap:3px;padding:4px 8px;transition:background .15s}
  .row:nth-child(even){background:#0d1117}
  .row:nth-child(odd){background:#161b22}
  .row.changed{background:#2a2410;outline:1px solid #d29922;outline-offset:-1px}
  .blk{color:#8b949e;font-size:.74rem;width:105px;flex-shrink:0}
  .byt{width:30px;height:28px;text-align:center;font-family:monospace;font-size:.8rem;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:0;text-transform:uppercase;transition:border-color .15s}
  .byt:focus{border-color:#58a6ff;outline:none;box-shadow:0 0 0 2px rgba(88,166,255,.2)}
  .st2{font-size:.65rem;color:#484f58;width:50px;text-align:center;flex-shrink:0}

  #log{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:6px 10px;margin-top:8px;font-family:monospace;font-size:.8rem;min-height:36px;max-height:120px;overflow-y:auto;white-space:pre-wrap}
  #log .t{color:#484f58}
  #log .ok{color:#3fb950}
  #log .er{color:#f85149}

  .history{background:#0d1117;border:1px solid #21262d;border-radius:8px;margin-top:8px;overflow:hidden}
  .history-header{padding:6px 10px;font-size:.8rem;color:#8b949e;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #21262d;cursor:pointer;user-select:none}
  .history-header:hover{background:#161b22}
  .h-count{color:#484f58;font-size:.7rem}
  .history-body{max-height:200px;overflow-y:auto;display:none}
  .history-body.open{display:block}
  .h-entry{display:flex;align-items:center;gap:8px;padding:4px 10px;font-size:.75rem;cursor:pointer;transition:background .15s}
  .h-entry:nth-child(even){background:#0d1117}
  .h-entry:nth-child(odd){background:#161b22}
  .h-entry:hover{background:#1f2937}
  .h-time{color:#484f58;white-space:nowrap;flex-shrink:0}
  .h-blocks{color:#8b949e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
  .h-restore{color:#58a6ff;font-size:.65rem;opacity:.7;flex-shrink:0}

  #loading{text-align:center;margin-top:48px;color:#8b949e}
</style>
</head>
<body>

<div id="loading" class="loading">Loading…</div>

<div id="app" style="display:none">
  <h1>T57 RFID</h1>
  <div class="sub">pure JS · Web Serial API · 0xAA-…-0xBB</div>

  <div class="bar">
    <span class="dot" id="dot"></span>
    <span class="st" id="status">Not connected</span>
    <div class="group">
      <select id="baudSel">
        <option value="9600" selected>9600</option>
        <option value="19200">19200</option>
        <option value="38400">38400</option>
        <option value="57600">57600</option>
        <option value="115200">115200</option>
      </select>
      <button id="btnConn" class="primary">Connect</button>
      <button id="btnDisc" disabled>Disc</button>
    </div>
    <div class="group">
      <button id="btnRead" class="primary" disabled>Read</button>
      <button id="btnWrite" class="danger" disabled>Write ✓</button>
      <button id="btnDef" disabled>Default</button>
      <button id="btnBeep" disabled>Beep</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div id="log">Ready. Click Connect.</div>

  <div class="history" id="history-panel">
    <div class="history-header" id="history-header">
      <span>History <span class="h-count" id="h-count">(0)</span></span>
      <span id="h-toggle" style="color:#484f58">▸ show</span>
    </div>
    <div class="history-body" id="history-body"></div>
  </div>
</div>

<script>
"use strict";

const STX = 0xAA, ETX = 0xBB;
function bcc(b) { let x=0; for (const v of b) x^=v; return x; }

function encodeFrame(station, cmd, data) {
  const f = new Uint8Array(6+data.length);
  f[0]=STX;f[1]=station;f[2]=1+data.length;f[3]=cmd;f.set(data,4);
  f[4+data.length]=bcc(f.subarray(1,4+data.length));
  f[5+data.length]=ETX; return f;
}

function decodeFrame(buf) {
  if (buf.length<6||buf[0]!==STX) throw Error('bad frame');
  const len=buf[2],dl=len-1,bp=4+dl,lp=bp+1;
  if (buf.length<=lp||buf[lp]!==ETX) throw Error('truncated');
  if (bcc(buf.subarray(1,bp))!==buf[bp]) throw Error('bad bcc');
  return {status:buf[3],data:buf.slice(4,bp)};
}

async function readFrame(port, timeoutMs) {
  const r = port.readable.getReader();
  const buf=[]; const deadline=performance.now()+timeoutMs;
  try {
    while (performance.now()<deadline) {
      const rem=Math.max(1,deadline-performance.now());
      const result = await Promise.race([r.read(), wait(rem).then(()=>({timedOut:true}))]);
      if (result.timedOut) break;
      const {value,done}=result;
      if (done) break;
      for (const b of value) { buf.push(b); if (b===ETX) return new Uint8Array(buf); }
    }
  } finally { r.releaseLock(); }
  if (buf.length>0) return new Uint8Array(buf);
  throw Error('timeout');
}

function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

// USB-serial chip database (from selevo/WebUsbSerialTerminal)
const USB_TABLE = {
  0x0403: {FTDI: {0x6001:'FT232R',0x6010:'FT2232',0x6011:'FT4232',0x6014:'FT232H',0x6015:'FT231X'}},
  0x1a86: {Quinheng:{0x7523:'CH340',0x5523:'CH341'}},
  0x10c4: {'Silicon Labs':{0xea60:'CP210x',0xea70:'CP2105',0xea71:'CP2108'}},
  0x067b: {Prolific:{0x2303:'PL2303'}},
};

async function createTransport() {
  // On Android, WebUSB works but WebSerial doesn't — try USB first if available
  const isAndroid = /android/i.test(navigator.userAgent || '');

  if (isAndroid && navigator.usb) {
    try { return await createWebUSBTransport(); } catch(e) { console.log('WebUSB try:',e.message); }
  }

  // Try Web Serial (desktop Chrome, Edge, etc.)
  if (navigator.serial) {
    try {
      const p = await navigator.serial.requestPort();
      await p.open({baudRate:9600,dataBits:8,stopBits:1,parity:'none'});
      try { await p.setSignals({dataTerminalReady:false,requestToSend:false}); } catch(e) {}
      const w = p.writable.getWriter();
      return {
        type:'serial',
        write: async b => { await w.write(b); },
        read: async t => {
          const r=p.readable.getReader(),buf=[],dl=performance.now()+t;
          try {
            while (performance.now()<dl) {
              const res=await Promise.race([r.read(),wait(Math.max(1,dl-performance.now())).then(()=>({timedOut:true}))]);
              if (res.timedOut) break;
              for (const b of res.value||[]) { buf.push(b); if (b===ETX) return new Uint8Array(buf); }
              if (res.done) break;
            }
          } finally { r.releaseLock(); }
          if (buf.length) return new Uint8Array(buf);
          throw Error('timeout');
        },
        drain: async () => {
          const r=p.readable.getReader();
          await Promise.race([r.read(),wait(50).then(()=>({timedOut:true}))]);
          r.releaseLock();
        },
        close: async () => { w.releaseLock(); await p.close(); }
      };
    } catch(e) { console.log('Web Serial:',e.message); }
  }

  // Fallback to WebUSB (Android / desktop with USB-serial adapter)
  if (navigator.usb) return await createWebUSBTransport();

  throw Error('No serial/USB API. Try Chrome/Edge on HTTPS.');
}

async function createWebUSBTransport() {
  // Build filter from chip database
  const filters = [];
  Object.keys(USB_TABLE).forEach(vid => {
    Object.keys(USB_TABLE[vid]).forEach(vname => {
      Object.keys(USB_TABLE[vid][vname]).forEach(pid => {
        filters.push({vendorId:parseInt(vid),productId:parseInt(pid)});
      });
    });
  });

  let dev, epIn, epOut, ifaceNum;

  // Try known chips first, then any USB device
  try {
    dev = await navigator.usb.requestDevice({filters});
  } catch(e) {
    try { dev = await navigator.usb.requestDevice({filters:[{}]}); } catch(e2) {
      throw Error('No device selected');
    }
  }

  await dev.open();
  if (dev.configuration === null) await dev.selectConfiguration(1);

  // Find vendor-specific interface (class 0xFF) with bulk endpoints
  for (const iface of dev.configuration.interfaces) {
    for (const alt of iface.alternates) {
      if (alt.interfaceClass === 0xFF) {
        ifaceNum = iface.interfaceNumber;
        for (const ep of alt.endpoints) {
          if (ep.direction==='out' && ep.type==='bulk') epOut = ep.endpointNumber;
          if (ep.direction==='in' && ep.type==='bulk') epIn = ep.endpointNumber;
        }
      }
    }
    if (epOut && epIn) break;
  }

  // If no vendor-specific interface, try all interfaces (CDC ACM, etc.)
  if (!epOut || !epIn) {
    for (const iface of dev.configuration.interfaces) {
      for (const alt of iface.alternates) {
        ifaceNum = iface.interfaceNumber;
        for (const ep of alt.endpoints) {
          if (!epOut && ep.direction==='out' && ep.type==='bulk') epOut = ep.endpointNumber;
          if (!epIn && ep.direction==='in' && ep.type==='bulk') epIn = ep.endpointNumber;
          if (epOut && epIn) break;
        }
      }
      if (epOut && epIn) break;
    }
  }

  if (!epOut || !epIn) throw Error('No bulk endpoints found on device');
  
  await dev.claimInterface(ifaceNum);
  try { await dev.selectAlternateInterface(ifaceNum, 0); } catch(e) {}

  // CH340 init
  const chipName = (USB_TABLE[dev.vendorId]||{})[Object.keys(USB_TABLE[dev.vendorId]||{})[0]||'']?.[dev.productId]||'unknown';
  const ct = async (dir,req,val,idx,len=0) => {
    if (dir === 'in') {
      return await dev.controlTransferIn({requestType:'vendor',recipient:'device',request:req,value:val,index:idx}, len);
    } else {
      const d = len ? new DataView(new ArrayBuffer(len)) : new DataView(new ArrayBuffer(0));
      await dev.controlTransferOut({requestType:'vendor',recipient:'device',request:req,value:val,index:idx}, d);
    }
  };
  // Full CH340 init — if it fails, device uses defaults (9600 baud works)
  try {
    await ct('out',0xA1,0xC29C,0xB2B9);
    await ct('out',0xA4,0xDF,ifaceNum);
    await ct('out',0xA4,0x9F,ifaceNum);
    await ct('in',0x95,0x0706,ifaceNum,2);
    await ct('out',0x9A,0x2727,ifaceNum);
    await ct('out',0x9A,0x1312,0xB282);
    await ct('out',0x9A,0x0F2C,0x0008);
    await ct('out',0x9A,0x2518,0x00C3);
    await ct('in',0x95,0x0706,ifaceNum,2);
    await ct('out',0x9A,0x2727,ifaceNum);
  } catch(e) { console.log('init:',e.message); }

  console.log('WebUSB connected:', chipName);
  log(`WebUSB: ${chipName || dev.productName}`, 'ok');

  return {
    type:'webusb', chip:chipName,
    write: async b => { await dev.transferOut(epOut,b); },
    read: async t => {
      const buf=[], dl=performance.now()+t;
      while (performance.now()<dl) {
        const res = await Promise.race([
          dev.transferIn(epIn,64).then(r=>({data:r.data})),
          wait(Math.max(1,dl-performance.now())).then(()=>({timedOut:true}))
        ]);
        if (res.timedOut) break;
        const arr = new Uint8Array(res.data.buffer);
        for (const b of arr) { buf.push(b); if (b===ETX) return new Uint8Array(buf); }
      }
      if (buf.length) return new Uint8Array(buf);
      throw Error('timeout');
    },
    drain: async () => {},
    close: async () => { try{ await dev.close(); }catch(e){} }
  };
}

let transport=null,connected=false,busy=false;
const blocks=Array.from({length:8},()=>new Uint8Array(4));
const lastRead=Array.from({length:8},()=>null);
const changed=new Set(), selected=new Set();
let historyOpen=false;

async function transact(cmd, payload) {
  const frame = encodeFrame(0,cmd,payload);
  await transport.drain(); await transport.write(frame); await wait(100);
  const resp=await transport.read(5000);
  const dec=decodeFrame(resp);
  if (dec.status!==0) throw Error(`status ${dec.status.toString(16)}`);
  return dec.data;
}

async function readAll() {
  let raw;
  try {
    raw = await transact(0x9A,[0xFE]);
    if (raw.length>4) {
      let same=true;
      for (let i=4;i<raw.length;i+=4)
        if (raw[i]!==raw[0]||raw[i+1]!==raw[1]||raw[i+2]!==raw[2]||raw[i+3]!==raw[3]){same=false;break}
      if (same) throw Error('garbage');
    }
  } catch(e) { raw = await transact(0x90,[0]); }
  if (raw.length<4) throw Error('short read');
  const n=Math.min(Math.floor(raw.length/4),7);
  for (let i=0;i<n;i++) {const o=i*4; blocks[i+1]=new Uint8Array([raw[o],raw[o+1],raw[o+2],raw[o+3]]);}
  if (n<6) {
    for (let i=n+1;i<=6;i++) try {
      const r=await transact(0x90,[0,i]);
      if (r.length>=4) blocks[i]=new Uint8Array([r[0],r[1],r[2],r[3]]);
    } catch(e) { break; }
  }
  for (const b of [0,7]) {
    if (blocks[b].some(v=>v!==0)) continue;
    try { const r=await transact(0x90,[0,b]); if (r.length===4) blocks[b]=new Uint8Array([r[0],r[1],r[2],r[3]]); } catch(e) {}
  }
}

async function writeBlock(n,data) { await transact(0x91,[0,n,data[0],data[1],data[2],data[3]]); }
async function beep() { await transact(0x89,[5,1]); }
async function getSerialNumber() { try{const r=await transact(0x83,[]);if(r.length>=8)return Array.from(r.slice(0,8)).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase()}catch(e){return''} }
async function getFirmwareVersion() { try{return new TextDecoder().decode(await transact(0x86,[])).replace(/\0/g,'').trim()}catch(e){return''} }

function el(id){return document.getElementById(id)}

function grid() {
  const g=el('grid');g.innerHTML='';
  for (let b=0;b<8;b++) {
    const r=document.createElement('div');r.className='row';r.id='r'+b;
    const cb=document.createElement('input');cb.type='checkbox';cb.id='cb'+b;
    cb.style.cssText='margin:0 4px 0 0;accentColor:#238636;cursor:pointer';
    cb.onchange=()=>{selected[cb.checked?'add':'delete'](b);render()};
    r.appendChild(cb);
    const l=document.createElement('span');l.className='blk';
    l.textContent=b===0?'Config':'Block '+b; r.appendChild(l);
    for (let i=0;i<4;i++) {
      const inp=document.createElement('input');inp.className='byt';inp.id='b'+b+'_'+i;
      inp.maxLength=2;inp.placeholder='00';inp.oninput=()=>onEdit(b);
      inp.onkeydown=e=>{
        if (e.key==='ArrowRight'&&i<3){e.preventDefault();el('b'+(b)+'_'+(i+1)).focus()}
        if (e.key==='ArrowLeft'&&i>0){e.preventDefault();el('b'+(b)+'_'+(i-1)).focus()}
        if (e.key==='ArrowUp'&&b>0){e.preventDefault();el('b'+(b-1)+'_'+(i)).focus()}
        if (e.key==='ArrowDown'&&b<7){e.preventDefault();el('b'+(b+1)+'_'+(i)).focus()}
      };
      r.appendChild(inp);
    }
    const s=document.createElement('span');s.className='st2';s.id='s'+b;
    r.appendChild(s);g.appendChild(r);
  }
}

function setBlock(b,data){for(let i=0;i<4;i++)el('b'+b+'_'+i).value=data[i].toString(16).padStart(2,'0').toUpperCase();blocks[b]=new Uint8Array(data)}
function getBlock(b){const o=new Uint8Array(4);for(let i=0;i<4;i++)o[i]=parseInt(el('b'+b+'_'+i).value||'0',16)||0;return o}
function bytesEqual(a,b){for(let i=0;i<4;i++)if(a[i]!==b[i])return false;return true}

function onEdit(b) {
  const cur=getBlock(b);blocks[b]=cur;
  const was=lastRead[b];
  if (was&&!bytesEqual(cur,was)){changed.add(b);el('r'+b).classList.add('changed');el('s'+b).textContent='EDITED';selected.add(b);el('cb'+b).checked=true}
  else{changed.delete(b);el('r'+b).classList.remove('changed');el('s'+b).textContent=''}
  render();
}

function render() {
  el('dot').className='dot'+(connected?' on':'');
  el('status').textContent=connected?'Connected':'Not connected';
  el('btnConn').disabled=connected;el('btnDisc').disabled=!connected;
  el('btnRead').disabled=!connected||busy;
  el('btnWrite').disabled=!connected||busy||selected.size===0;
  el('btnDef').disabled=!connected||busy;el('btnBeep').disabled=!connected||busy;
}

function log(msg,cls) {
  el('log').innerHTML+=`<span class="t">[${new Date().toLocaleTimeString()}]</span> <span class="${cls}">${msg}</span>\n`;
  el('log').scrollTop=el('log').scrollHeight;
}

function renderHistory() {
  const hist=JSON.parse(localStorage.getItem('t57_history')||'[]');
  el('h-count').textContent=`(${hist.length})`;
  const body=el('history-body');
  body.innerHTML=hist.map((e,i)=>{
    const t=new Date(e.time);
    const parts=e.blocks.map((b,bi)=>b.some(v=>v!==0)?b.map(v=>v.toString(16).padStart(2,'0').toUpperCase()).join(''):null);
    const summary=parts.map((p,i)=>p?`${i}:${p}`:null).filter(Boolean).join(' · ');
    return `<div class="h-entry" data-idx="${i}"><span class="h-time">${t.toLocaleString()}</span><span class="h-blocks">${summary||'(empty)'}</span><span class="h-restore">↩ restore</span></div>`;
  }).join('');
  // Click handler via delegation
  Array.from(body.children).forEach(entry=>{
    entry.onclick=()=>{
      const idx=parseInt(entry.dataset.idx);
      const hist=JSON.parse(localStorage.getItem('t57_history')||'[]');
      const e=hist[idx]; if(!e) return;
      for(let b=0;b<8;b++){setBlock(b,new Uint8Array(e.blocks[b]));lastRead[b]=null;changed.delete(b);el('r'+b).classList.remove('changed');el('s'+b).textContent='✓';if(e.blocks[b].some(v=>v!==0)){selected.add(b);el('cb'+b).checked=true}else{selected.delete(b);el('cb'+b).checked=false}}
      render();
      log('Restored from '+new Date(e.time).toLocaleString(),'ok');
    };
  });
}

// Toggle history panel
el('history-header').onclick=()=>{historyOpen=!historyOpen;el('history-body').className='history-body'+(historyOpen?' open':'');el('h-toggle').textContent=historyOpen?'▾ hide':'▸ show';if(historyOpen)renderHistory()};

el('btnConn').onclick=async()=>{
  if(busy)return;busy=true;render();
  try{
    transport=await createTransport();connected=true;render();
    log(`Connected (${transport.type}${transport.chip?' '+transport.chip:''})`,'ok');
    const sn=await getSerialNumber(),fw=await getFirmwareVersion();
    if(sn||fw)log(`SN:${sn||'?'} FW:${fw||'?'}`,'ok');
    log('Ready — press Read','ok');
  }catch(e){log('Connect: '+e,'er');console.error(e)}
  busy=false;render();
};

el('btnDisc').onclick=async()=>{
  connected=false;render();
  try{if(transport){await transport.close();transport=null}}catch(e){}
  for(let b=0;b<8;b++){lastRead[b]=null;setBlock(b,[0,0,0,0])}
  changed.clear();selected.clear();render();
  log('Disconnected','er');
};

el('btnRead').onclick=async()=>{
  if(busy)return;busy=true;render();
  try{
    const prev=blocks.map(b=>new Uint8Array(b));
    log('Reading…','t');
    await readAll();
    // Save read to history
    const hist=JSON.parse(localStorage.getItem('t57_history')||'[]');
    hist.unshift({time:new Date().toISOString(),blocks:blocks.map(b=>Array.from(b))});
    if(hist.length>20)hist.length=20;
    localStorage.setItem('t57_history',JSON.stringify(hist));
    renderHistory();
    let cnt=0;
    for(let b=0;b<8;b++){
      const z=blocks[b].every(v=>v===0);
      if(!z)cnt++;
      setBlock(b,blocks[b]);lastRead[b]=new Uint8Array(blocks[b]);
      if(!bytesEqual(blocks[b],prev[b])){el('r'+b).classList.add('changed');el('s'+b).textContent='CHANGED';changed.add(b)}
      else{changed.delete(b);el('r'+b).classList.remove('changed');el('s'+b).textContent=z?'—':'✓'}
      el('cb'+b).checked=!z;if(!z)selected.add(b);else selected.delete(b);
    }
    render();log(`Read ${cnt} blocks`,'ok');
  }catch(e){log('Read: '+e,'er');console.error(e)}
  busy=false;render();
};

el('btnWrite').onclick=async()=>{
  const toWrite=[...selected];
  if(toWrite.length===0){log('No blocks selected','t');return}
  if(!confirm(`Write ${toWrite.length} block(s): ${toWrite.join(',')}?`)){log('Cancelled','t');return}
  if(busy)return;busy=true;render();
  try{
    const userVals=blocks.map(b=>new Uint8Array(b));
    try{log('Reading device state for history…','t');await readAll()}catch(e){log('Pre-read failed','er')}
    const hist=JSON.parse(localStorage.getItem('t57_history')||'[]');
    hist.unshift({time:new Date().toISOString(),blocks:blocks.map(b=>Array.from(b))});
    if(hist.length>20)hist.length=20;
    localStorage.setItem('t57_history',JSON.stringify(hist));
    renderHistory();
    for(const b of toWrite)blocks[b]=userVals[b];
    for(const b of toWrite)setBlock(b,blocks[b]);
    for(const b of toWrite){await writeBlock(b,blocks[b]);lastRead[b]=new Uint8Array(blocks[b]);changed.delete(b);el('r'+b).classList.remove('changed');el('s'+b).textContent='✓'}
    selected.clear();render();
    log(`Wrote ${toWrite.length} block(s)`,'ok');
  }catch(e){log('Write: '+e,'er');console.error(e)}
  busy=false;render();
};

el('btnDef').onclick=()=>{
  const d=new Uint8Array([0x00,0x08,0x80,0xE8]);
  setBlock(0,d);changed.add(0);el('r0').classList.add('changed');el('s0').textContent='EDITED';selected.add(0);el('cb0').checked=true;
  render();log('Config 000880E8','ok');
};

el('btnBeep').onclick=async()=>{
  if(busy)return;busy=true;render();
  try{await beep();log('Beep!','ok')}catch(e){log('Beep: '+e,'er')}
  busy=false;render();
};

grid();el('loading').style.display='none';el('app').style.display='block';
</script>
</body>
</html>
